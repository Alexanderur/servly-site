<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servly</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
    background: #000;
    color: white;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    padding: 20px 40px;
}

.btn {
    background: #ffb800;
    padding: 12px 20px;
    border-radius: 10px;
    color: black;
    text-decoration: none;
    font-weight: 600;
}

/* HERO */
.hero {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 80px 40px;
}

/* TEXT */
.hero-text {
    max-width: 500px;
}

.hero-text h1 {
    font-size: 56px;
    line-height: 1.1;
}

.hero-text span {
    color: #ffb800;
}

.hero-text p {
    color: #aaa;
    margin: 20px 0;
}

/* IMAGE */
.hero-image img {
    width: 500px;
}

/* MOBILE */
@media (max-width: 900px) {
    .hero {
        flex-direction: column;
        text-align: center;
    }

    .hero-image img {
        width: 100%;
        margin-top: 30px;
    }
}
</style>
</head>

<body>

<header>
    <h2>SERVLY</h2>
    <a href="#" class="btn">Оставить заявку</a>
</header>

<section class="hero">

<div class="hero-text">
    <h1>
        Найди мастера<br>
        <span>за 2 минуты</span>
    </h1>

    <p>Сервис для поиска проверенных специалистов</p>

    <a href="#" class="btn">Оставить заявку</a>
</div>

<div class="hero-image">
    <img src="phones.png">
</div>

</section>

</body>
</html>
