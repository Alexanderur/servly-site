<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servly</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    background: #0b0b0f;
    color: white;
}

.container {
    max-width: 1200px;
    margin: auto;
    padding: 20px;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 0;
}

.logo {
    font-weight: 700;
    font-size: 20px;
}

.btn {
    background: #f5b400;
    color: black;
    padding: 12px 20px;
    border-radius: 10px;
    font-weight: 600;
    text-decoration: none;
}

/* HERO */
.hero {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 60px;
    gap: 40px;
}

.hero-text h1 {
    font-size: 48px;
    line-height: 1.2;
}

.hero-text span {
    color: #f5b400;
}

.hero-text p {
    margin: 20px 0;
    opacity: 0.7;
}

.hero img {
    width: 300px;
}

/* CARDS */
.section {
    margin-top: 80px;
}

.cards {
    display: flex;
    gap: 20px;
    margin-top: 20px;
}

.card {
    background: #1a1a22;
    padding: 20px;
    border-radius: 16px;
    flex: 1;
}

/* FORM */
.form {
    background: #1a1a22;
    padding: 30px;
    border-radius: 16px;
    margin-top: 60px;
}

input, textarea {
    width: 100%;
    margin-top: 10px;
    padding: 14px;
    border-radius: 10px;
    border: none;
}

textarea {
    height: 100px;
}

button {
    margin-top: 15px;
    padding: 14px;
    border: none;
    border-radius: 10px;
    background: #f5b400;
    font-weight: 600;
}

/* MOBILE */
@media(max-width: 768px) {
    .hero {
        flex-direction: column;
        text-align: center;
    }

    .cards {
        flex-direction: column;
    }
}
</style>
</head>

<body>

<div class="container">

<header>
<div class="logo">SERVLY</div>
<a href="#form" class="btn">Оставить заявку</a>
</header>

<section class="hero">
<div class="hero-text">
<h1>Найди мастера <br><span>за 2 минуты</span></h1>
<p>Сервис для поиска проверенных специалистов</p>
<a href="#form" class="btn">Оставить заявку</a>
</div>

<img src="https://i.imgur.com/8Km9tLL.png" alt="">
</section>

<div class="section">
<h2>Почему Servly</h2>
<div class="cards">
<div class="card">⚡ Быстрый отклик</div>
<div class="card">✔ Проверенные мастера</div>
<div class="card">💬 Удобный чат</div>
</div>
</div>

<div class="section">
<h2>Популярные мастера</h2>
<div class="cards">
<div class="card">🔧 Сантехник</div>
<div class="card">💡 Электрик</div>
<div class="card">🧹 Уборка</div>
</div>
</div>

<div id="form" class="form">
<h2>Оставить заявку</h2>

<input placeholder="Ваше имя">
<input placeholder="Телефон">
<textarea placeholder="Что нужно сделать"></textarea>

<button>Отправить</button>
</div>

</div>

</body>
</html>
