<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servly</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
    background: radial-gradient(circle at top right, #111, #000);
    color: white;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 60px;
}

.logo {
    font-weight: 700;
    font-size: 20px;
}

.btn {
    background: #ffb800;
    padding: 12px 20px;
    border-radius: 12px;
    color: black;
    text-decoration: none;
    font-weight: 600;
    transition: 0.2s;
}

.btn:hover {
    transform: scale(1.05);
}

/* HERO */
.hero {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 80px 60px;
}

/* TEXT */
.hero-text {
    max-width: 520px;
}

.hero-text h1 {
    font-size: 60px;
    line-height: 1.1;
}

.hero-text span {
    color: #ffb800;
}

.hero-text p {
    color: #aaa;
    margin: 20px 0 30px;
}

/* FEATURES */
.features {
    margin-top: 20px;
}

.features div {
    margin-bottom: 10px;
    color: #ccc;
}

/* IMAGE */
.hero-image {
    position: relative;
}

.hero-image img {
    width: 520px;
    transform: rotate(-5deg);
    filter: drop-shadow(0 40px 80px rgba(255,184,0,0.2));
}

/* MOBILE */
@media (max-width: 900px) {
    .hero {
        flex-direction: column;
        text-align: center;
    }

    .hero-image img {
        width: 100%;
        transform: none;
        margin-top: 40px;
    }
}
</style>
</head>

<body>

<header>
    <div class="logo">SERVLY</div>
    <a href="#" class="btn">Оставить заявку</a>
</header>

<section class="hero">

<div class="hero-text">
    <h1>
        Найди мастера<br>
        <span>за 2 минуты</span>
    </h1>

    <p>
        Сервис для поиска проверенных специалистов рядом с вами
    </p>

    <a href="#" class="btn">Оставить заявку</a>

    <div class="features">
        <div>⚡ Быстрый поиск</div>
        <div>✔ Проверенные мастера</div>
        <div>🕒 Экономия времени</div>
        <div>⭐ Любые задачи</div>
    </div>
</div>

<div class="hero-image">
    <img src="phones.jpg">
</div>

</section>

</body>
</html>
