<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servly</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
    background: #0b0b0f;
    color: white;
}

/* CONTAINER */
.container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 20px;
}

/* HEADER */
header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 80px;
}

.logo {
    font-weight: 700;
    font-size: 20px;
}

.btn {
    background: #ffb800;
    color: black;
    padding: 12px 20px;
    border-radius: 10px;
    text-decoration: none;
    font-weight: 600;
}

/* HERO */
.hero {
    display: flex;
    align-items: center;
    justify-content: space-between;
}

/* LEFT */
.hero-left {
    max-width: 500px;
}

.hero-left h1 {
    font-size: 52px;
    line-height: 1.1;
    margin-bottom: 20px;
}

.hero-left span {
    color: #ffb800;
}

.hero-left p {
    color: #aaa;
    margin-bottom: 25px;
}

/* PHONES */
.hero-center {
    position: relative;
    width: 520px;
    height: 520px;
}

/* PHONE */
.phone {
    position: absolute;
    width: 260px;
    height: 540px;
    border-radius: 42px;
    background: linear-gradient(145deg,#111,#000);
    padding: 10px;
    box-shadow:
        0 60px 140px rgba(0,0,0,0.9),
        inset 0 0 0 2px #222;
}

/* SCREEN */
.screen {
    position: relative;
    width: 100%;
    height: 100%;
    border-radius: 32px;
    background: linear-gradient(180deg,#111,#000);
    padding: 16px;
}

/* NOTCH */
.notch {
    position: absolute;
    top: 8px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 26px;
    background: black;
    border-radius: 20px;
    z-index: 2;
}

/* UI */
.title {
    margin-top: 30px;
    margin-bottom: 15px;
    font-weight: 600;
}

.card {
    background: #1a1a22;
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 10px;
    color: #ccc;
    font-size: 14px;
}

.highlight {
    background: #ffb800;
    color: black;
    font-weight: 600;
}

/* POSITION */
.phone-left {
    left: 0;
    top: 80px;
    transform: rotate(-12deg);
    z-index: 1;
}

.phone-right {
    right: 0;
    top: 0;
    transform: rotate(12deg);
    z-index: 2;
}

/* MOBILE */
@media (max-width: 900px) {
    .hero {
        flex-direction: column;
        text-align: center;
    }

    .hero-center {
        margin-top: 40px;
        height: auto;
    }

    .phone {
        position: relative;
        transform: none;
        margin: 20px auto;
    }
}
</style>
</head>

<body>

<div class="container">

<header>
    <div class="logo">SERVLY</div>
    <a href="#" class="btn">Оставить заявку</a>
</header>

<section class="hero">

<div class="hero-left">
    <h1>
        Решаем ваши задачи быстро.<br>
        <span>Мастера рядом.</span>
    </h1>

    <p>Найдём проверенного мастера за 10 минут</p>

    <a href="#" class="btn">Оставить заявку</a>
</div>

<div class="hero-center">

    <!-- CLIENT -->
    <div class="phone phone-left">
        <div class="screen">
            <div class="notch"></div>

            <div class="title">Главная</div>

            <div class="card">🔍 Что нужно сделать?</div>
            <div class="card">🔧 Ремонт</div>
            <div class="card">🧹 Уборка</div>
            <div class="card">💡 Электрика</div>

            <div class="card highlight">ТОП мастер ⭐</div>
        </div>
    </div>

    <!-- MASTER -->
    <div class="phone phone-right">
        <div class="screen">
            <div class="notch"></div>

            <div class="title">Заказы рядом</div>

            <div class="card">Электрик — 150₾</div>
            <div class="card">Уборка — 120₾</div>
            <div class="card">Сборка — 200₾</div>

            <div class="card highlight">Новый заказ</div>
        </div>
    </div>

</div>

</section>

</div>

</body>
</html>
