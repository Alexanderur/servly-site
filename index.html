<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Servly</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#0b0b0f;
    color:#fff;
}

.container {
    width:90%;
    max-width:1200px;
    margin:auto;
}

header {
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 0;
}

.logo {
    font-weight:bold;
    font-size:20px;
}

.btn {
    background:#ffb800;
    color:#000;
    padding:12px 20px;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
}

.hero {
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:60px 0;
}

.hero h1 {
    font-size:48px;
}

.hero span {
    color:#ffb800;
}

.cards {
    display:flex;
    gap:20px;
    margin-top:40px;
}

.card {
    background:#1a1a22;
    padding:20px;
    border-radius:12px;
    flex:1;
}

.workers {
    display:flex;
    gap:20px;
    margin-top:40px;
}

.worker {
    background:#1a1a22;
    padding:20px;
    border-radius:12px;
    flex:1;
}

.form {
    margin-top:60px;
    background:#1a1a22;
    padding:30px;
    border-radius:12px;
}

input, textarea {
    width:100%;
    padding:10px;
    margin:10px 0;
    border:none;
    border-radius:8px;
}

button {
    background:#ffb800;
    border:none;
    padding:12px;
    border-radius:8px;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<header>
<div class="logo">SERVLY</div>
<a href="#" class="btn">Оставить заявку</a>
</header>

<section class="hero">
<div>
<h1>Найди мастера <br><span>за 2 минуты</span></h1>
<p>Сервис для поиска проверенных специалистов</p>
<a href="#" class="btn">Оставить заявку</a>
</div>
</section>

<h2>Почему Servly</h2>
<div class="cards">
<div class="card">⚡ Быстрый отклик</div>
<div class="card">✔ Проверенные мастера</div>
<div class="card">💬 Удобный чат</div>
</div>

<h2>Популярные мастера</h2>
<div class="workers">
<div class="worker">🔧 Сантехник</div>
<div class="worker">💡 Электрик</div>
<div class="worker">🧹 Уборка</div>
</div>

<div class="form">
<h2>Оставить заявку</h2>
<input placeholder="Ваше имя">
<input placeholder="Телефон">
<textarea placeholder="Что нужно сделать"></textarea>
<button>Отправить</button>
</div>

</div>

</body>
</html>
